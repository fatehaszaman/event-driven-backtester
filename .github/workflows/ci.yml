name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Import check
        run: python -c "from backtest import BacktestEngine, Portfolio, BaseStrategy, HistoricalDataFeed, FillSimulator; print('imports ok')"

      - name: Run demo
        run: python examples/demo.py

      - name: Run benchmark (smoke)
        run: python scripts/bench.py

      - name: Run tests (if present)
        run: |
          if [ -d tests ] || ls test_*.py 2>/dev/null || ls *_test.py 2>/dev/null; then
            pip install pytest
            pytest -q
          else
            echo "No test suite found; skipping."
          fi
